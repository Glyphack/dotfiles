[env]

[tools]
# Go
go = "1.26"
"go:golang.org/x/tools/gopls" = "latest"
golangci-lint = "v2.11.3"

# Rust
rust = { version = "1.91.0", components = "rust-src,llvm-tools,rustfmt,rust-analyzer" }
"cargo:cargo-benchcmp" = "0.4.5"
"cargo:cargo-fuzz" = "latest"
"cargo:cargo-insta" = "1.42.2"
"cargo:cargo-lldb-test" = "0.1.0"
"cargo:cargo-nextest" = "0.9.93"
"cargo:flamegraph" = "0.6.8"
"cargo:inferno" = "0.12.2"
"cargo:samply" = "0.13.1"
"cargo:toml2json" = "1.3.1"
"cargo:trunk" = "0.21.14"

# Python
ruff = "latest"
ty = "latest"
uv = "latest"

"pipx:djlint" = "latest"
"pipx:git+https://github.com/astral-sh/ecosystem-analyzer.git@main" = "latest"
"pipx:huec" = "latest"
"pipx:towelie" = "latest"
"pipx:yt-dlp" = "latest"

# General
meson = "latest"
prek = "latest"
"cargo:diskus" = "latest"
"github:cli/cli" = "latest"

clojure = "1.12.4"

node = "24"
"npm:pnpm" = "latest"

[tool_alias]
clojure = "https://github.com/asdf-community/asdf-clojure.git"

[settings]
experimental = true
lockfile = true
idiomatic_version_file_enable_tools = ["rust"]
pipx.uvx = true

[settings.github]
credential_command = "gh auth token"
